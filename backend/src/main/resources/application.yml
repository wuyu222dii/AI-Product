spring:
  application:
    name: cowriting-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}/${SUPABASE_DB_NAME}?sslmode=require&currentSchema=public
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Supabase Session pooler (port 5432) caps total clients at pool_size (often 15).
      # Keep this low so restarts / multiple local instances do not exhaust the pool.
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  devtools:
    restart:
      enabled: true
      additional-exclude: uploaded-materials/**,logs/**,target/surefire-reports/**
    livereload:
      enabled: false

server:
  port: 8080

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: INFO

openai:
  api-key: ${OPENAI_API_KEY}
  base-url: ${OPENAI_BASE_URL}
  model: ${OPENAI_MODEL}
  timeout-seconds: ${OPENAI_TIMEOUT_SECONDS}
